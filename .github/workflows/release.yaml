---
name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CI: true

permissions:
  contents: write

jobs:
  dist:
    name: Build and attach dist artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version from release tag
        id: version
        run: |
          set -e
          version="${{ github.event.release.tag_name }}"
          if [ -z "$version" ]; then
            version="$(git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build dist matrix
        run: make dist VERSION="${{ steps.version.outputs.version }}"

      - name: Smoke linux artifact
        run: |
          set -e
          version="${{ steps.version.outputs.version }}"
          tar -xzf "dist/facts-ca-${version}-linux-amd64.tar.gz" -C /tmp
          got="$(/tmp/facts-ca-${version}-linux-amd64/facts-ca-cli --version)"
          test "$got" = "$version"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facts-ca-dist
          path: |
            dist/facts-ca-*.tar.gz
            dist/facts-ca-*.zip
            dist/SHA256SUMS

      - name: Attach artifacts and checksums to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/facts-ca-*.tar.gz \
            dist/facts-ca-*.zip \
            dist/SHA256SUMS \
            --clobber

  bump-tap:
    name: Bump Homebrew tap formula
    needs: dist
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      # Requires a ncode/homebrew-tap repo with a facts-ca formula and a
      # HOMEBREW_TAP_TOKEN secret; the job no-ops gracefully if either is absent.
      - name: Bump formula in ncode/homebrew-tap
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: ncode/homebrew-tap
          formula: facts-ca
          tag: ${{ github.event.release.tag_name }}
          force: false
