<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Facts CA — a Puppet-compatible certificate authority in Go">
  <defs>
    <filter id="mesh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <clipPath id="frame">
      <rect width="1200" height="400"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="400" fill="#fafafa"/>

    <!-- Brand mesh gradient: develop / preview / ship pairs collapsed into one
         atmospheric object across the upper half. -->
    <g filter="url(#mesh)">
      <circle cx="230" cy="90" r="170" fill="#7928ca" opacity="0.38"/>
      <circle cx="420" cy="40" r="160" fill="#007cf0" opacity="0.36"/>
      <circle cx="600" cy="90" r="170" fill="#00dfd8" opacity="0.34"/>
      <circle cx="540" cy="150" r="120" fill="#50e3c2" opacity="0.30"/>
      <circle cx="790" cy="40" r="160" fill="#ff0080" opacity="0.32"/>
      <circle cx="940" cy="100" r="150" fill="#ff4d4d" opacity="0.26"/>
      <circle cx="1060" cy="60" r="150" fill="#f9cb28" opacity="0.34"/>
    </g>

    <!-- caption-mono eyebrow -->
    <text x="600" y="148" text-anchor="middle"
          font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace"
          font-size="13" letter-spacing="2" fill="#888888">FACTS CA — A GO PORT OF THE PUPPET CA</text>

    <!-- display-xl headline: sentence case, period-terminated, negative tracking -->
    <text x="600" y="230" text-anchor="middle"
          font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="72" font-weight="600" letter-spacing="-3.6" fill="#171717">Certificates, the Puppet way.</text>

    <!-- body-lg lead -->
    <text x="600" y="282" text-anchor="middle"
          font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="20" fill="#4d4d4d">facts-ca-server issues, facts-ca-cli enrolls — over the Puppet CA v1 API, in Go.</text>

    <!-- code eyebrow -->
    <text x="600" y="340" text-anchor="middle"
          font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace"
          font-size="13" fill="#888888">$ go get github.com/ncode/facts-ca</text>

    <!-- hairline base -->
    <rect y="399" width="1200" height="1" fill="#ebebeb"/>
  </g>
</svg>
